<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>救護助手</title>
  
  <!-- PWA Web App Meta Tags for iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="救護助手">
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Fullscreen Breathing and Shock Alert Overlay -->
  <div id="vent-overlay" class="vent-flash-overlay">
    <div id="vent-text" class="vent-text">給氧</div>
  </div>

  <!-- Splash / Audio Unlock Screen -->
  <div id="splash-screen" class="splash-overlay">
    <div class="splash-logo" style="background: none; box-shadow: none; animation: logo-scale-pulse 2s infinite ease-in-out;">
      <img src="d0c65ba4-4bd4-41bd-ab4d-e1063726e894.png" alt="Logo" style="width: 90px; height: 90px; border-radius: 24px; object-fit: contain;">
    </div>
    <h2 class="splash-title">救護助手</h2>
    <p class="splash-subtitle">emergency</p>
    <button id="btn-start-flow" class="start-btn" onclick="startApp()">啟動急救流程</button>
    <div class="splash-footer">
      <p>僅作急救輔助使用，不可用於販售之用途</p>
    </div>
  </div>

  <!-- Main Application Container -->
  <div class="app-container">
    
    <!-- Top iOS-styled Header -->
    <header>
      <div class="brand">
        <div class="brand-icon" style="background: none; box-shadow: none;">
          <img src="d0c65ba4-4bd4-41bd-ab4d-e1063726e894.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 8px; display: block; object-fit: contain;">
        </div>
        <div class="brand-title">
          <h1>救護助手</h1>
          <span>跟著節奏動起來</span>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="btn-mic-toggle" class="btn-mic-toggle" onclick="toggleSpeechRecognition()" title="啟動語音辨識">
          <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor" style="width: 14px; height: 14px; display: block;">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
          </svg>
          <span id="mic-status-text">語音：關</span>
        </button>
        <div id="connection-badge" style="font-size: 0.75rem; font-weight: 800; background: var(--ios-card-inner); padding: 4px 10px; border-radius: 20px; color: var(--color-red);">
          On fire
        </div>
      </div>
    </header>

    <!-- Content Columns Grid -->
    <main id="cpr-main-panel" class="main-grid">
      
      <!-- COLUMN 1: Metronome Panel -->
      <section class="panel" id="cpr-metronome-card">
        <div class="panel-header">
          <span class="panel-title">節拍器</span>
        </div>
        
        <!-- Circular Timing Progress Ring -->
        <div class="timer-container">
          <svg class="progress-ring" width="180" height="180">
            <circle class="progress-ring-circle-bg" stroke="#2c2c2e" stroke-width="8" fill="transparent" r="78" cx="90" cy="90"/>
            <circle id="timer-progress-ring" class="progress-ring-circle" stroke="#34c759" stroke-width="8" fill="transparent" r="78" cx="90" cy="90" stroke-dasharray="490" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-content">
            <div id="cpr-timer-readout" class="cpr-clock">02:00</div>
            <div id="cpr-status-label" class="cpr-status">CPR 進行中</div>
            <div id="cpr-breath-hint" class="cpr-counter">準備中...</div>
          </div>
        </div>

        <!-- Metronome Control -->
        <button id="btn-toggle-metronome" class="metro-toggle active" onclick="toggleMetronome()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
          <span>節拍器：開</span>
        </button>

        <!-- CPR Modes Grid -->
        <div class="modes-grid">
          <button id="mode-30-2" class="btn-mode active" onclick="setCPRMode('30:2')">30:2</button>
          <button id="mode-15-2" class="btn-mode" onclick="setCPRMode('15:2')">15:2</button>
          <button id="mode-cont" class="btn-mode" onclick="setCPRMode('CONT')">連續按壓</button>
          <button id="mode-lucas" class="btn-mode" onclick="setCPRMode('LUCAS')">6秒給氧</button>
        </div>

        <!-- Shocks and Rhythm Selection -->
        <div class="shocks-area">
          <button class="btn-aed" onclick="triggerAEDShock()">AED 電擊</button>
          <div class="manual-shock-row">
            <select id="manual-joules-select" class="joule-select">
              <option value="120">120J</option>
              <option value="150">150J</option>
              <option value="200" selected>200J</option>
              <option value="270">270J</option>
              <option value="360">360J</option>
            </select>
            <button class="btn-manual-shock" onclick="triggerManualShock()">手動電擊</button>
          </div>
          <select id="rhythm-select" class="ecg-select" onchange="logECGRhythm(this)">
            <option value="" disabled selected>紀錄心律 (ECG Rhythm)</option>
            <option value="VF">VF (心室纖維顫動)</option>
            <option value="pVT">pVT (無脈搏性心室頻脈)</option>
            <option value="Asystole">Asystole (心電停止)</option>
            <option value="PEA">PEA (無脈搏電氣活動)</option>
            <option value="NSR">NSR (正常竇性心律)</option>
            <option value="SB">SB (竇性心緩)</option>
            <option value="ST">ST (竇性心頻)</option>
            <option value="SVT">SVT (心室上頻脈)</option>
            <option value="VT">VT (心室頻脈)</option>
            <option value="AFib">AFib (心房顫動)</option>
            <option value="AFlutter">AFlutter (心房撲動)</option>
            <option value="AVB">AVB (房室傳導阻滯)</option>
            <option value="Others">Others (其他)</option>
          </select>
        </div>
      </section>

      <!-- COLUMN 2: Interventions & Meds -->
      <section class="panel" id="cpr-meds-card">
        <div class="panel-header">
          <span class="panel-title">給藥 / 處置</span>
        </div>

        <!-- Tactile Epinephrine 1mg with Embedded Progress Bar -->
        <div id="btn-epinephrine" class="epi-btn-container" onclick="administerEpinephrine()">
          <div id="epi-progress-bar" class="epi-btn-progress"></div>
          <div class="epi-btn-text-content">
            <span class="epi-title">Epinephrine 1mg</span>
            <span id="epi-timer-readout" class="epi-status">準備就緒</span>
          </div>
        </div>

        <!-- Action Items Quick Grid -->
        <div class="actions-grid">
          <button class="btn-action" onclick="logAction('Amio 300mg', 'drug')">Amio 300mg</button>
          <button class="btn-action" onclick="logAction('Amio 150mg', 'drug')">Amio 150mg</button>
          <button class="btn-action" onclick="logAction('Lidocaine', 'drug')">Lidocaine</button>
          <button class="btn-action" onclick="logAction('Atropine 1mg', 'drug')">Atropine 1mg</button>
          <button class="btn-action" onclick="logAction('Adenosine', 'drug')">Adenosine</button>
          <button class="btn-action" onclick="logAction('建立 IV/IO', 'drug')">建立 IV/IO</button>
          
          <button class="btn-action btn-action-primary" onclick="logAction('建立進階呼吸道 (Endo/LMA)', 'drug')">建立進階呼吸道 (Endo/LMA)</button>
          <button class="btn-action" onclick="logAction('患者類別: OHCA', 'type')">OHCA</button>
          <button class="btn-action" onclick="logAction('患者類別: IHCA', 'type')">IHCA</button>
          
          <!-- ROSC Button -->
          <button id="btn-rosc-trigger" class="btn-action btn-rosc" onclick="triggerROSCState()">ROSC 恢復自發循環</button>
        </div>
      </section>

      <!-- COLUMN 3: Global Timing & System Logging -->
      <section class="panel logging-panel" id="cpr-logging-card">
        <div class="panel-header">
          <span class="panel-title">計時 / 紀錄</span>
        </div>

        <!-- Global Clock -->
        <div id="global-timer-readout" class="global-clock">00:00:00</div>

        <!-- Console Logging Stream -->
        <div id="logs-container" class="log-stream">
          <div class="log-entry">
            <span class="log-time">--:--</span>
            <span class="log-msg">系統待命...</span>
          </div>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-action-row">
          <button class="btn-bottom" onclick="logAction('5H5T 評估', 'type')">5H5T</button>
          <button class="btn-bottom" onclick="exportLogsToTxt()">匯出紀錄</button>
          <button class="btn-bottom btn-stop-mission" onclick="endResuscitationMission()">結束任務</button>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
  
  <!-- PWA Offline Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker Registered Successfully.', reg.scope))
          .catch((err) => console.log('Service Worker Registration Failed:', err));
      });
    }
  </script>
</body>
</html>
